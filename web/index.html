<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snake · Q-learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --void: #0a130d; --moss: #0f1c14; --scale: #16281c; --vine: #21402c;
    --bone: #e9f1e7; --sage: #7c9585; --faint: #4a6153;
    --emerald: #2fbf71; --jade: #7ff0a8; --amber: #f5b740; --venom: #ff6a5a;
    --shadow: 0 22px 60px -24px rgba(0,0,0,.85);
    --display: "Fraunces", Georgia, "Times New Roman", serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --diamond: 26px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1100px 700px at 12% -12%, #14261a 0%, transparent 55%), var(--void);
    color: var(--bone); font-family: var(--mono); -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center; padding: 32px;
  }
  .console {
    position: relative; width: min(1120px, 100%); background: var(--moss);
    background-image:
      repeating-linear-gradient(63deg, rgba(120,180,140,.045) 0 1px, transparent 1px var(--diamond)),
      repeating-linear-gradient(-63deg, rgba(120,180,140,.045) 0 1px, transparent 1px var(--diamond));
    border: 1px solid var(--vine); border-radius: 20px; box-shadow: var(--shadow); overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 13px; padding: 18px 24px;
    border-bottom: 1px solid var(--vine); background: linear-gradient(180deg, rgba(255,255,255,.02), transparent);
  }
  .led { width: 10px; height: 10px; border-radius: 50%; background: var(--faint); flex: none; }
  .live .led { background: var(--emerald); box-shadow: 0 0 12px 1px var(--emerald); }
  .dead .led { background: var(--venom); box-shadow: 0 0 12px 1px var(--venom); }
  @media (prefers-reduced-motion: no-preference) { .live .led { animation: pulse 1.5s ease-in-out infinite; } }
  @keyframes pulse { 50% { box-shadow: 0 0 4px 0 var(--emerald); opacity: .5; } }
  .mark { font-family: var(--display); font-style: italic; font-weight: 700; font-size: 24px; line-height: 1; }
  .policy-tag { color: var(--sage); font-size: 13px; }
  .policy-tag::before { content: "·"; margin: 0 8px 0 6px; color: var(--faint); }
  .eyebrow { margin-left: auto; font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--faint); }

  .grid { display: grid; grid-template-columns: 1fr 274px; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  .stage { padding: 26px; display: flex; align-items: center; justify-content: center; }
  .terrarium {
    position: relative; padding: 12px; border-radius: 16px; background: #0b160f;
    border: 1px solid var(--vine); box-shadow: inset 0 1px 0 rgba(255,255,255,.05), inset 0 0 40px 6px rgba(0,0,0,.55); line-height: 0;
  }
  .terrarium::after {
    content: ""; position: absolute; inset: 12px; border-radius: 8px; pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,.05), transparent 22%), radial-gradient(130% 120% at 50% 0%, transparent 60%, rgba(0,0,0,.4));
  }
  canvas { display: block; max-width: 100%; height: auto; border-radius: 8px; }

  .panel {
    border-left: 1px solid var(--vine); padding: 20px; display: flex; flex-direction: column; gap: 18px;
    background: rgba(8,16,11,.35);
  }
  @media (max-width: 760px) { .panel { border-left: 0; border-top: 1px solid var(--vine); } }

  .status .word { font-family: var(--display); font-style: italic; font-weight: 600; font-size: 28px; line-height: 1; }
  .status .sub { font-size: 12px; color: var(--sage); margin-top: 6px; min-height: 15px; }
  .live .status .word { color: var(--jade); }
  .dead .status .word { color: var(--venom); }

  .seg-label { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--faint); margin-bottom: 7px; }
  .seg { display: flex; gap: 4px; background: #0c150f; border: 1px solid var(--vine); border-radius: 10px; padding: 3px; }
  .seg button {
    flex: 1; font-family: var(--mono); font-size: 11px; letter-spacing: -.02em; white-space: nowrap;
    color: var(--sage); background: transparent;
    border: 0; border-radius: 7px; padding: 9px 2px; cursor: pointer; transition: background .12s, color .12s;
  }
  .seg button:hover { color: var(--bone); }
  .seg button.on { background: var(--scale); color: var(--jade); box-shadow: inset 0 0 0 1px var(--vine); }

  .readout { display: grid; gap: 2px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--vine); }
  .row:last-child { border-bottom: 0; }
  .row .k { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--sage); }
  .row .v { font-size: 18px; font-variant-numeric: tabular-nums; color: var(--bone); }
  .row.hero .v { font-size: 28px; font-weight: 700; }
  .human #statesRow { display: none; }
  .human #idleRow { border-bottom: 0; }
  .human #overlay, .human #policy { display: none; }
  .row.hero .v.bump { animation: bump .35s ease; color: var(--jade); }
  @keyframes bump { 30% { transform: scale(1.18); } }

  .policy { display: none; }
  .policy.show { display: block; }
  .policy .seg-label { display: flex; justify-content: space-between; }
  .pbar { display: grid; grid-template-columns: 20px 1fr auto; align-items: center; gap: 9px; margin: 7px 0; }
  .pbar .lab { font-size: 11px; color: var(--sage); }
  .pbar .track { height: 7px; border-radius: 4px; background: #0c150f; overflow: hidden; box-shadow: inset 0 0 0 1px var(--vine); }
  .pbar .fill { height: 100%; background: var(--faint); border-radius: 4px; transition: width .15s; }
  .pbar .num { font-size: 11px; color: var(--sage); font-variant-numeric: tabular-nums; min-width: 44px; text-align: right; }
  .pbar.best .lab, .pbar.best .num { color: var(--amber); }
  .pbar.best .fill { background: var(--amber); }

  .controls { display: flex; gap: 8px; }
  button.ctl {
    flex: 1; font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--bone);
    background: var(--scale); border: 1px solid var(--vine); border-radius: 10px; padding: 11px 8px;
    cursor: pointer; transition: background .12s, border-color .12s, transform .06s;
  }
  button.ctl:hover { background: #1d3325; border-color: #2c5238; }
  button.ctl:active { transform: translateY(1px); }
  button.play { flex: 1.6; color: #05220f; background: var(--emerald); border-color: var(--emerald); font-weight: 700; }
  button.play:hover { background: var(--jade); border-color: var(--jade); }
  button.ctl.toggle { flex: none; width: 100%; text-align: left; }
  .toggle.on { color: var(--amber); border-color: #4a4326; background: #1c1a10; }
  :focus-visible { outline: 2px solid var(--emerald); outline-offset: 2px; }

  .speed label { display: flex; justify-content: space-between; align-items: baseline; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--sage); margin-bottom: 8px; }
  .speed .val { color: var(--bone); letter-spacing: 0; }
  input[type="range"] { width: 100%; accent-color: var(--emerald); cursor: pointer; }

  .hint { font-size: 11px; color: var(--faint); line-height: 1.9; }
  .hint kbd { color: var(--sage); background: #13241a; border: 1px solid var(--vine); border-radius: 4px; padding: 0 5px; font-size: 10px; }
</style>
</head>
<body>
  <div class="console" id="console">
    <header>
      <span class="led"></span>
      <span class="mark">Snake</span><span class="policy-tag" id="tag">policy</span>
      <span class="eyebrow" id="mode">Watch mode</span>
    </header>

    <div class="grid">
      <div class="stage"><div class="terrarium"><canvas id="board" width="100" height="100"></canvas></div></div>

      <aside class="panel">
        <div class="status">
          <div class="word" id="statusWord">Ready</div>
          <div class="sub" id="statusSub">trained agent, standing by</div>
        </div>

        <div>
          <div class="seg-label">Controlled by</div>
          <div class="seg" id="seg"></div>
        </div>

        <div class="readout">
          <div class="row hero"><span class="k">Score</span><span class="v" id="score">0</span></div>
          <div class="row"><span class="k">Steps</span><span class="v" id="steps">0</span></div>
          <div class="row" id="idleRow"><span class="k">Idle</span><span class="v" id="idle">0</span></div>
          <div class="row" id="statesRow"><span class="k">States seen</span><span class="v" id="states">0</span></div>
        </div>

        <div class="policy" id="policy">
          <div class="seg-label"><span>Policy — action values</span></div>
          <div class="pbar" data-k="left"><span class="lab">L</span><div class="track"><div class="fill"></div></div><span class="num">–</span></div>
          <div class="pbar" data-k="straight"><span class="lab">S</span><div class="track"><div class="fill"></div></div><span class="num">–</span></div>
          <div class="pbar" data-k="right"><span class="lab">R</span><div class="track"><div class="fill"></div></div><span class="num">–</span></div>
        </div>

        <div class="controls">
          <button class="ctl play" id="play">▶ Play</button>
          <button class="ctl" id="step">Step</button>
          <button class="ctl" id="reset">Reset</button>
        </div>
        <button class="ctl toggle" id="overlay">◇ Policy overlay: off</button>

        <div class="speed">
          <label><span>Speed</span><span class="val"><span id="spsLabel">12</span>/s</span></label>
          <input type="range" id="sps" min="1" max="60" value="12" />
        </div>

        <div class="hint" id="hint"></div>
      </aside>
    </div>
  </div>

<script>
const CELL = 44;
const DIRS = [[-1, 0], [0, 1], [1, 0], [0, -1]];
const ARROW = { ArrowUp: "up", ArrowRight: "right", ArrowDown: "down", ArrowLeft: "left" };
const DIR_NAME = ["up", "right", "down", "left"];
const TURNS = [["left", -1], ["straight", 0], ["right", 1]];
const COL = {
  floor1: "#12241a", floor2: "#091209", grid: "rgba(120,180,140,.05)",
  emerald: "#2fbf71", jade: "#7ff0a8", eyeWhite: "#f4fbf3", pupil: "#123021", food: "#ff6a5a",
};
const DEATH = { body: "bit its own tail", wall: "struck the glass", timeout: "gave up hunting" };

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const $ = (id) => document.getElementById(id);
const consoleEl = $("console");

let state = null, playing = false, sps = 12, timer = null, sizedTo = null, prevScore = 0;
let controller = "rays", overlayOn = false, desiredDir = "right";
const isYou = () => controller === "you";

function sizeCanvas(w, h) {
  const key = w + "x" + h;
  if (sizedTo === key) return;
  canvas.width = w * CELL; canvas.height = h * CELL; sizedTo = key;
}

function draw(s) {
  sizeCanvas(s.width, s.height);
  const W = s.width, H = s.height;

  const bg = ctx.createRadialGradient(canvas.width / 2, 0, 0, canvas.width / 2, 0, H * CELL * 1.25);
  bg.addColorStop(0, COL.floor1); bg.addColorStop(1, COL.floor2);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = COL.grid; ctx.lineWidth = 1; ctx.beginPath();
  for (let i = 0; i <= W; i++) { const x = i * CELL + 0.5; ctx.moveTo(x, 0); ctx.lineTo(x, H * CELL); }
  for (let j = 0; j <= H; j++) { const y = j * CELL + 0.5; ctx.moveTo(0, y); ctx.lineTo(W * CELL, y); }
  ctx.stroke();

  if (overlayOn && !isYou() && s.policy && s.running) drawOverlay(s);

  if (s.food) {
    const cx = s.food[1] * CELL + CELL / 2, cy = s.food[0] * CELL + CELL / 2;
    ctx.shadowColor = COL.food; ctx.shadowBlur = 16; ctx.fillStyle = COL.food;
    ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.28, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  }

  const pts = s.body.map(([i, j]) => [j * CELL + CELL / 2, i * CELL + CELL / 2]);
  if (pts.length) {
    ctx.lineJoin = "round"; ctx.lineCap = "round";
    const trace = () => {
      ctx.beginPath(); ctx.moveTo(pts[pts.length - 1][0], pts[pts.length - 1][1]);
      for (let k = pts.length - 2; k >= 0; k--) ctx.lineTo(pts[k][0], pts[k][1]);
    };
    ctx.shadowColor = "rgba(47,191,113,.35)"; ctx.shadowBlur = 10;
    ctx.strokeStyle = COL.emerald; ctx.lineWidth = CELL * 0.74; trace(); ctx.stroke(); ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(160,245,190,.30)"; ctx.lineWidth = CELL * 0.24; trace(); ctx.stroke();

    const [hx, hy] = pts[0];
    ctx.fillStyle = COL.jade;
    ctx.beginPath(); ctx.arc(hx, hy, CELL * 0.44, 0, Math.PI * 2); ctx.fill();

    let dx = 1, dy = 0;
    if (pts.length > 1) { dx = hx - pts[1][0]; dy = hy - pts[1][1]; const m = Math.hypot(dx, dy) || 1; dx /= m; dy /= m; }
    const px = -dy, py = dx;
    const ex = hx + dx * CELL * 0.13, ey = hy + dy * CELL * 0.13;
    for (const sgn of [1, -1]) {
      const cx = ex + px * sgn * CELL * 0.18, cy = ey + py * sgn * CELL * 0.18;
      ctx.fillStyle = COL.eyeWhite; ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.15, 0, Math.PI * 2); ctx.fill();
      const ppx = cx + dx * CELL * 0.05, ppy = cy + dy * CELL * 0.05;
      ctx.fillStyle = COL.pupil; ctx.beginPath(); ctx.arc(ppx, ppy, CELL * 0.08, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = COL.eyeWhite; ctx.beginPath(); ctx.arc(ppx - dx * CELL * 0.03 + px * CELL * 0.03, ppy - dy * CELL * 0.03 + py * CELL * 0.03, CELL * 0.03, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (!s.running) {
    ctx.fillStyle = "rgba(6,14,9,.72)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    ctx.fillStyle = s.won ? COL.emerald : COL.food;
    ctx.font = "italic 600 30px 'Fraunces', serif";
    ctx.fillText(s.won ? "Solved" : "Crashed", canvas.width / 2, canvas.height / 2 - 2);
    ctx.fillStyle = "#93a8a0"; ctx.font = "13px 'JetBrains Mono', monospace";
    ctx.fillText(s.won ? "filled the vivarium" : (DEATH[s.death_cause] || ""), canvas.width / 2, canvas.height / 2 + 24);
  }
}

function drawOverlay(s) {
  const [hi, hj] = s.body[0];
  const vals = TURNS.map(([k]) => s.policy[k]);
  const lo = Math.min(...vals), hi2 = Math.max(...vals), span = hi2 - lo || 1;
  for (const [k, turn] of TURNS) {
    const nidx = (((s.dir_idx + turn) % 4) + 4) % 4;
    const ci = hi + DIRS[nidx][0], cj = hj + DIRS[nidx][1];
    if (ci < 0 || cj < 0 || ci >= s.height || cj >= s.width) continue;
    const t = (s.policy[k] - lo) / span;
    const best = k === s.greedy;
    ctx.fillStyle = best ? `rgba(245,183,64,${0.18 + 0.45 * t})` : `rgba(47,191,113,${0.12 + 0.4 * t})`;
    ctx.fillRect(cj * CELL + 2, ci * CELL + 2, CELL - 4, CELL - 4);
    if (best) {
      ctx.strokeStyle = "#f5b740";
      ctx.lineWidth = 2; ctx.strokeRect(cj * CELL + 2.5, ci * CELL + 2.5, CELL - 5, CELL - 5);
    }
  }
}

function renderPolicy(s) {
  const box = $("policy");
  const active = overlayOn && !isYou();
  box.classList.toggle("show", active);
  if (!active) return;
  const p = s.policy;
  const vals = p ? TURNS.map(([k]) => p[k]) : null;
  const lo = vals ? Math.min(...vals) : 0, hi = vals ? Math.max(...vals) : 1, span = (hi - lo) || 1;
  for (const bar of box.querySelectorAll(".pbar")) {
    const k = bar.dataset.k;
    const has = p && p[k] !== undefined;
    bar.querySelector(".fill").style.width = has ? `${8 + 92 * (p[k] - lo) / span}%` : "0%";
    bar.querySelector(".num").textContent = has ? p[k].toFixed(2) : "–";
    bar.classList.toggle("best", has && k === s.greedy);
  }
}

function render(s) {
  state = s;
  draw(s);
  renderPolicy(s);
  $("tag").textContent = isYou() ? "manual control" : "q-learning · " + s.agent_label.toLowerCase() + " state";
  $("mode").textContent = isYou() ? "Hands on" : "Watch mode";
  $("steps").textContent = s.steps.toLocaleString();
  $("idle").textContent = s.steps_since_food;
  $("states").textContent = s.states_visited.toLocaleString();

  const scoreEl = $("score");
  scoreEl.textContent = s.score;
  if (s.score > prevScore) { scoreEl.classList.remove("bump"); void scoreEl.offsetWidth; scoreEl.classList.add("bump"); }
  prevScore = s.score;

  let cls = "", word, sub;
  if (s.won) { cls = "dead"; word = "Solved"; sub = "filled the vivarium"; }
  else if (!s.alive) { cls = "dead"; word = "Crashed"; sub = DEATH[s.death_cause] || ""; }
  else if (playing) { cls = "live"; word = isYou() ? "Driving" : "Hunting"; sub = isYou() ? "you're steering" : "agent is choosing moves"; }
  else if (s.steps > 0) { word = "Coiled"; sub = "paused mid-game"; }
  else { word = "Ready"; sub = isYou() ? "arrow keys to steer" : "trained agent, standing by"; }
  consoleEl.className = "console " + cls + (isYou() ? " human" : "");
  $("statusWord").textContent = word;
  $("statusSub").textContent = sub;

  for (const b of $("seg").children) b.classList.toggle("on", b.dataset.name === controller);
  $("hint").innerHTML = isYou()
    ? '<kbd>space</kbd> play · <kbd>← ↑ → ↓</kbd> steer · <kbd>r</kbd> reset'
    : '<kbd>space</kbd> play · <kbd>s</kbd> step · <kbd>r</kbd> reset · <kbd>↑↓</kbd> speed<br /><kbd>v</kbd> policy overlay';
}

async function api(path, method = "POST", body) {
  const opt = { method };
  if (body) { opt.headers = { "Content-Type": "application/json" }; opt.body = JSON.stringify(body); }
  return (await fetch(path, opt)).json();
}
async function agentStep() { render(await api("/api/step")); if (state && !state.running) setPlaying(false); }
async function humanStep() { render(await api("/api/move", "POST", { dir: desiredDir })); if (state && !state.running) setPlaying(false); }
async function reset() { prevScore = 0; const s = await api("/api/reset"); if (isYou()) desiredDir = DIR_NAME[s.dir_idx]; render(s); }

function tickLoop() {
  clearInterval(timer);
  if (playing) timer = setInterval(() => { if (playing) (isYou() ? humanStep : agentStep)(); }, 1000 / sps);
}
function setPlaying(on) {
  playing = on;
  $("play").innerHTML = on ? "❚❚ Pause" : "▶ Play";
  if (on && state && !state.running) reset().then(tickLoop); else tickLoop();
  if (state) render(state);
}
function doStep() { setPlaying(false); if (state && !state.running) reset(); else (isYou() ? humanStep : agentStep)(); }
function setSpeed(v) { sps = Math.max(1, Math.min(60, v)); $("sps").value = sps; $("spsLabel").textContent = sps; if (playing) tickLoop(); }

async function setController(name) {
  if (name === controller) return;
  controller = name;
  let s;
  if (name === "you") { s = state || (await api("/api/state", "GET")); desiredDir = DIR_NAME[s.dir_idx]; }
  else { s = await api("/api/agent", "POST", { name }); }
  render(s);
}

function steer(name) {
  if (!state) return;
  if ((DIR_INDEX_OPP[name]) === state.dir_idx) return;
  desiredDir = name;
  if (!playing) humanStep();
}
const DIR_INDEX_OPP = { up: 2, right: 3, down: 0, left: 1 };

function buildSeg(agents) {
  const seg = $("seg"); seg.innerHTML = "";
  for (const a of agents) seg.appendChild(mkSeg(a.name, a.label));
  seg.appendChild(mkSeg("you", "You"));
}
function mkSeg(name, label) {
  const b = document.createElement("button");
  b.dataset.name = name; b.textContent = label;
  b.onclick = () => setController(name);
  return b;
}

$("play").onclick = () => setPlaying(!playing);
$("step").onclick = doStep;
$("reset").onclick = () => { setPlaying(false); reset(); };
$("overlay").onclick = () => {
  overlayOn = !overlayOn;
  $("overlay").classList.toggle("on", overlayOn);
  $("overlay").textContent = (overlayOn ? "◆" : "◇") + " Policy overlay: " + (overlayOn ? "on" : "off");
  if (state) render(state);
};
$("sps").oninput = (e) => setSpeed(+e.target.value);

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === " ") { e.preventDefault(); setPlaying(!playing); }
  else if (e.key === "r") { setPlaying(false); reset(); }
  else if (e.key === "v" && !isYou()) $("overlay").onclick();
  else if (isYou() && ARROW[e.key]) { e.preventDefault(); steer(ARROW[e.key]); }
  else if (!isYou() && e.key === "s") doStep();
  else if (!isYou() && e.key === "ArrowUp") { e.preventDefault(); setSpeed(sps + 1); }
  else if (!isYou() && e.key === "ArrowDown") { e.preventDefault(); setSpeed(sps - 1); }
});

api("/api/state", "GET").then((s) => { controller = s.agent; desiredDir = DIR_NAME[s.dir_idx]; buildSeg(s.agents); render(s); });
</script>
</body>
</html>
